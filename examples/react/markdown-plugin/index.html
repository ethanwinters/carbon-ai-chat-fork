<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@carbon/ai-chat - react - markdown plugin (KaTeX)</title>
    <!--
      KaTeX stylesheet. The markdown-it-katex plugin emits unstyled <span
      class="katex"> output; without this stylesheet, math renders as raw
      characters. Loaded via CDN to keep the example's npm footprint small.
    -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      .chat-custom-element {
        height: 100vh;
        width: 100vw;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
