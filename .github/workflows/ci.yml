name: ci-check
on:
  push:
    branches: [ main, release/v*, feat/prompt-line ]
  pull_request:
    branches: [ main, release/v*, feat/prompt-line ]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Run build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: |
          npm ci --prefer-offline
          npx playwright install --with-deps
      - name: Build ai-chat
        run: npm run aiChat:build
      - name: Build ai-chat-components
        run: cd packages/ai-chat-components && npm run build
      - name: Run test
        run: npm run test

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Check formatting of project files (staged)
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run format:staged
      - name: Check formatting of project files (non-staged)
        if: ${{ github.event_name != 'pull_request' }}
        run: npm run format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Lint
        run: npm run lint && npm run lint:styles

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: License check
        run: npm run lint:license

  validate-agents-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Validate agents files
        run: npm run validate:agents

  chromatic-wc-storybook:
    if:
      ${{ github.repository == 'carbon-design-system/carbon-ai-chat' &&
      github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    outputs:
      buildUrl: ${{ steps.chromatic.outputs.buildUrl }}
      storybookUrl: ${{ steps.chromatic.outputs.storybookUrl }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # 👇 Tells the checkout which commit hash to reference
          # https://www.chromatic.com/docs/github-actions/#recommended-configuration-for-build-events
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: github.event_name != 'merge_group'
        id: cache
        with:
          path: |
            node_modules
            */**/node_modules
          key:
            ${{ runner.os }}-npm-${{ hashFiles('package-lock.json',
            'packages/**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Build @carbon/ai-chat-components package
        run: npm run build --workspace=@carbon/ai-chat-components
      - name: Build storybook
        run: npm run storybook:build --workspace=@carbon/ai-chat-components
      - id: chromatic
        name: Run Chromatic
        uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # v18.0.1
        with:
          # 👇 Token is intentionally plaintext
          # https://www.chromatic.com/docs/github-actions/#run-chromatic-on-external-forks-of-open-source-projects
          projectToken: chpt_bdf649378875471
          workingDir: packages/ai-chat-components
          buildScriptName: storybook:build
          zip: true # Runs Chromatic with the option to compress the build output
          autoAcceptChanges: 'main' # Option to accept all changes on main
          onlyChanged: true # 👈 Required option to enable TurboSnap
        env:
          # 👇 Set to the PR branch if it's a PR; otherwise, falls back to the pushed branch name
          CHROMATIC_BRANCH:
            ${{ github.event.pull_request.head.ref || github.ref_name }}
          # 👇 Set to the PR head commit if it's a PR; otherwise to the ref (which typically resolves to the latest commit SHA)
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
          # 👇 Makes sure this is always set to the corect owner/repo
          CHROMATIC_SLUG: ${{ github.repository }}


  chromatic-react-wrapper-storybook:
    if:
      ${{ github.repository == 'carbon-design-system/carbon-ai-chat' &&
      github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    outputs:
      buildUrl: ${{ steps.chromatic.outputs.buildUrl }}
      storybookUrl: ${{ steps.chromatic.outputs.storybookUrl }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # 👇 Tells the checkout which commit hash to reference
          # https://www.chromatic.com/docs/github-actions/#recommended-configuration-for-build-events
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Use Node.js version from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: "npm"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: github.event_name != 'merge_group'
        id: cache
        with:
          path: |
            node_modules
            */**/node_modules
          key:
            ${{ runner.os }}-npm-${{ hashFiles('package-lock.json',
            'packages/**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Build @carbon/ai-chat-components package
        run: npm run build --workspace=@carbon/ai-chat-components
      - name: Build storybook
        run: npm run storybook:build --workspace=@carbon/ai-chat-components
      - id: chromatic
        name: Run Chromatic
        uses: chromaui/action@94713c544284a14195de3b50ef24301579f1877e # v18.0.1
        with:
          # 👇 Token is intentionally plaintext
          # https://www.chromatic.com/docs/github-actions/#run-chromatic-on-external-forks-of-open-source-projects
          projectToken: chpt_b20070be5bf15ee
          workingDir: packages/ai-chat-components
          buildScriptName: storybook:react:build
          zip: true # Runs Chromatic with the option to compress the build output
          autoAcceptChanges: 'main' # Option to accept all changes on main
          onlyChanged: true # 👈 Required option to enable TurboSnap
        env:
          # 👇 Set to the PR branch if it's a PR; otherwise, falls back to the pushed branch name
          CHROMATIC_BRANCH:
            ${{ github.event.pull_request.head.ref || github.ref_name }}
          # 👇 Set to the PR head commit if it's a PR; otherwise to the ref (which typically resolves to the latest commit SHA)
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.ref }}
          # 👇 Makes sure this is always set to the corect owner/repo
          CHROMATIC_SLUG: ${{ github.repository }}
